@if (data$ | async; as data) {
  <dl class="custom-fields-view">
    @for (field of data; track field.name) {
      <div class="custom-field">
        <dt>{{ field.displayName }}</dt>
        <dd [class.no-value]="!field.value">
          {{ field.value || ('checkout.custom-field.no-value' | translate) }}
        </dd>
      </div>
    }
  </dl>
}
