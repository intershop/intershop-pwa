<div class="row pt-2">
  <!-- adding *ngIf="paypalPaymentMethod$ | async lead to time issues-->
  <div [ngClass]="pageType === 'cart' ? 'col-12' : 'col-11'">
    <div id="paypal-buttons-container"></div>
  </div>
  <ng-container *ngIf="(scriptLoaded$ | async) && pageType !== 'cart'">
    <div *ngIf="isPaypalPaymentMethodSelected$ | async" class="paypal-selected col-1">
      <fa-icon [icon]="['fas', 'check']" />
    </div>
    <div class="d-flex col-12 align-items-center my-4">
      <div class="flex-fill border-top border-secondary"></div>
      <span class="mx-3 font-weight-bold">{{ 'shopping_cart.payment.or.text' | translate }}</span>
      <div class="flex-fill border-top border-secondary"></div>
    </div>
  </ng-container>
</div>
<div *ngIf="(scriptLoaded$ | async) === false" class="alert alert-info">
  {{ 'checkout.payment.paypal.script.error.message' | translate }}
</div>
