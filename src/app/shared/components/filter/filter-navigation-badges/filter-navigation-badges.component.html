@if (selected) {
  <div class="row">
    <div class="col-md-10">
      @for (select of selected; track select.filterName) {
        <div class="filter-navigation-badges">
          <button
            class="btn btn-link btn-link-action btn-link-with-icon"
            type="button"
            (click)="apply(select.searchParameter)"
          >
            {{ select.filterName }}: {{ select.displayName }}<i class="bi bi-x form-control-feedback"></i>
          </button>
        </div>
      }
    </div>
    @if (selected.length) {
      <div class="col-md-2 text-end">
        <button class="btn btn-link btn-link-action" type="button" (click)="clear()">
          {{ 'product.remove_all_product_filters.text' | translate }}
        </button>
      </div>
    }
  </div>
}
