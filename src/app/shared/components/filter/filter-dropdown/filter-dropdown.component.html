<ng-select
  bindLabel="displayName"
  [attr.aria-label]="filterElement.name"
  [clearable]="!isMultiSelect"
  [closeOnSelect]="!isMultiSelect"
  [formControl]="selectedFacetsControl"
  [items]="filterElement.facets"
  [labelForId]="filterElement.id"
  [multiple]="isMultiSelect"
  [placeholder]="'filter.dropdown.select.text' | translate"
  [searchable]="false"
  (add)="apply($event)"
  (change)="onSingleChange($event)"
  (remove)="apply($event)"
>
  <ng-template let-facet="item" ng-option-tmp>
    {{ facet.displayName }}
    @if (facet.count) {
      ({{ facet.count }})
    }
  </ng-template>
  <ng-template let-clear="clear" let-facet="item" ng-label-tmp>
    <span class="ng-value-label">{{ facet.displayName }}</span>
    <span aria-hidden="true" class="ng-value-icon right" (click)="clear(facet)">×</span>
  </ng-template>
</ng-select>
