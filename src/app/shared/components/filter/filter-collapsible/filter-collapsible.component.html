<div class="filter-group" [ngClass]="{ collapsed: isCollapsed }">
  <button
    type="button"
    (click)="toggle()"
    class="btn btn-link btn-content-toggle mb-3"
    [attr.aria-expanded]="!isCollapsed"
    [attr.aria-controls]="filterElement.id"
    data-testing-id="filter-toggle-button"
  >
    <h3 class="m-0">{{ filterElement.name }}</h3>
    <i [class]="isCollapsed ? 'bi bi-chevron-down' : 'bi bi-chevron-up'"></i>
  </button>

  <ng-content />
</div>
