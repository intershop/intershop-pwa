<button
  class="panel-heading btn btn-link btn-content-toggle"
  type="button"
  (click)="toggleCollapse()"
  [attr.aria-expanded]="isCollapsed"
  [attr.aria-controls]="ariaControlsId"
  [attr.data-testing-id]="dataTestingId"
>
  {{ heading }}
  <fa-icon [icon]="['fas', isCollapsed ? 'minus' : 'plus']" />
</button>

<div class="panel-collapse collapse" [ngbCollapse]="!isCollapsed">
  <div class="panel-body" [id]="ariaControlsId">
    <ng-content></ng-content>
  </div>
</div>
