<button
  [id]="'toggle-' + accordionId"
  type="button"
  (click)="toggleCollapse()"
  class="panel-heading btn btn-link btn-content-toggle"
  [attr.aria-expanded]="!isCollapsed"
  [attr.aria-controls]="'panel-' + accordionId"
  [attr.data-testing-id]="dataTestingId"
>
  {{ heading }}
  <fa-icon [icon]="['fas', isCollapsed ? 'plus' : 'minus']" />
</button>

<div
  [ngbCollapse]="isCollapsed"
  class="panel-collapse collapse"
  role="region"
  [attr.aria-labelledby]="'toggle-' + accordionId"
>
  <div [id]="'panel-' + accordionId" class="panel-body">
    <ng-content></ng-content>
  </div>
</div>
