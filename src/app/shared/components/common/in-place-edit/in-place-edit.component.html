@if (viewMode) {
  <div class="d-flex flex-row align-items-center">
    <ng-content select="[viewModeContent]" />
    <button
      type="button"
      class="btn btn-link"
      [ngClass]="buttonClass"
      [title]="
        ariaLabelName === ''
          ? ('inplace_edit.click_to_edit' | translate)
          : ('inplace_edit.label' | translate: { '0': ariaLabelName | translate })
      "
      (click)="toggleEditMode(true)"
    >
      <i class="bi bi-pencil-fill me-auto"></i>
    </button>
  </div>
} @else {
  <div class="d-flex flex-row align-items-baseline">
    <ng-content select="[editModeForm]" />
    <button
      type="button"
      class="btn btn-link"
      [ngClass]="buttonClass"
      [title]="'inplace_edit.save' | translate"
      (click)="confirm()"
      data-testing-id="confirm"
      [disabled]="confirmDisabled"
    >
      <i class="bi bi-check-lg"></i>
    </button>
    <button
      type="button"
      class="btn btn-link"
      [ngClass]="buttonClass"
      [title]="'inplace_edit.cancel' | translate"
      (click)="cancel()"
      data-testing-id="cancel"
    >
      <i class="bi bi-x"></i>
    </button>
  </div>
}
