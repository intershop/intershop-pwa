@if (currentPage && itemCount) {
  <nav [attr.aria-label]="'navigation.paging.aria_label' | translate">
    <ngb-pagination
      [collectionSize]="itemCount"
      [ellipses]="true"
      [maxSize]="maxSize$ | async"
      [page]="currentPage"
      [pageSize]="pageSize"
      [rotate]="true"
      (pageChange)="setPage($event)"
    />
  </nav>
}
