<div class="form-check form-switch d-inline-block">
  <input
    autocomplete="off"
    class="form-check-input"
    role="switch"
    type="checkbox"
    [attr.aria-label]="ariaLabel"
    [checked]="active"
    [disabled]="disabled"
    [id]="id"
    (click)="toggleState()"
  />
  <label class="form-check-label" data-testing-id="formCheckLabel" [for]="id">{{
    activeState ? labelActive : labelInactive
  }}</label>
</div>
