@if (product$ | async; as product) { @if (!product.failed) {
<div class="product-tile" [attr.data-testing-sku]="product.sku">
  <div class="product-image-container">
    <ish-product-image imageType="M" [link]="true" loading="eager" />
    <ish-product-label />
  </div>
  <ish-product-name />
  <ish-product-rating *ishFeature="'rating'" [hideNumberOfReviews]="true" />
  <ish-product-promotion displayType="simple" />
  @if (configuration$('price') | async) {
  <div class="price-container">
    <ish-product-price [showInformationalPrice]="true" />
  </div>
  }
  <ish-product-item-variations />
  <div class="product-tile-actions btn-group">
    @defer {
    <ish-product-add-to-quote *ishFeature="'quoting'" displayType="icon" [ariaHidden]="true" cssClass="btn-link" />
    } @defer {
    <ish-product-add-to-compare displayType="icon" [ariaHidden]="true" cssClass="btn-link" />
    } @defer {
    <ish-product-add-to-order-template
      *ishFeature="'orderTemplates'"
      displayType="icon"
      [ariaHidden]="true"
      cssClass="btn btn-link me-0"
    />
    } @defer {
    <ish-product-add-to-wishlist *ishFeature="'wishlists'" displayType="icon" [ariaHidden]="true" cssClass="btn-link" />
    }
    <ish-product-add-to-basket displayType="icon" [ariaHidden]="true" cssClass="btn-link" />
  </div>
</div>
} }
