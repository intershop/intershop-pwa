@if (productSKUs$ | async; as products) {
  @if (products.length) {
    @if (listStyle === 'carousel' && !isServerSideRendering) {
      <div class="product-list">
        <div #swiper class="swiper">
          <div class="swiper-button-prev"></div>
          <div class="swiper-wrapper">
            @for (sku of products; track $index) {
              <div class="swiper-slide">
                <ish-deferred-item [cssClass]="listItemCSSClass">
                  <ng-template ishLazyLoadingContent>
                    <ish-product-item
                      ishProductContext
                      [configuration]="listItemConfiguration"
                      [displayType]="listItemStyle"
                      [sku]="sku"
                    />
                  </ng-template>
                </ish-deferred-item>
              </div>
            }
          </div>
          <div class="swiper-button-next"></div>
          <div class="swiper-pagination"></div>
        </div>
      </div>
    } @else {
      <div class="product-list row">
        @for (sku of products; track $index) {
          <div class="product-list-item" [ngClass]="listItemCSSClass">
            <ish-product-item
              ishProductContext
              [configuration]="listItemConfiguration"
              [displayType]="listItemStyle"
              [sku]="sku"
            />
          </div>
        }
      </div>
    }
  }
}
