<div *ngIf="showPayPalComponent" class="row pt-2">
  <div [ngClass]="'col-12'">
    <!-- PayPal Button container -->
    <div *ngIf="!isCardFieldsComponent(); else cardFieldsContainer" [id]="paypalComponentContainerId"></div>

    <!-- PayPal Card Fields containers -->
    <ng-template #cardFieldsContainer>
      <div class="card_container">
        <div class="row form-group">
          <div class="col-form-label col-md-4">
            {{ 'checkout.credit_card.holder.label' | translate }}
          </div>
          <div id="card-name-field-container" class="col-sm-6"></div>
          <div class="offset-md-4">
            <small id="card-name-field-error" class="form-text text-danger" style="display: none"></small>
          </div>
        </div>

        <div class="row form-group">
          <div class="col-form-label col-md-4">
            {{ 'checkout.credit_card.number.label' | translate }}
            <span class="required" aria-hidden="true">*</span>
          </div>
          <div id="card-number-field-container" class="col-sm-6"></div>
        </div>

        <div class="row form-group">
          <div class="col-form-label col-md-4">
            {{ 'checkout.credit_card.expiration_date.label' | translate }}
            <span class="required">*</span>
          </div>
          <div id="card-expiry-field-container" class="col-sm-2"></div>
        </div>

        <div class="row form-group">
          <div class="col-form-label col-md-4">
            {{ 'checkout.credit_card.cvc.short.label' | translate }}
            <span class="required" aria-hidden="true">*</span>
            <ng-template #Description>
              <span innerHTML="{{ 'checkout.credit_card.cvc.helptext' | translate }}"></span>
            </ng-template>
            <button
              type="button"
              class="btn btn-link details-tooltip header-note ps-0 ms-0"
              [ngbPopover]="Description"
              placement="bottom"
              popoverTitle="{{ 'checkout.credit_card.cvc.short.label' | translate }}"
            >
              <fa-icon [icon]="['fas', 'info-circle']" />
            </button>
          </div>
          <div id="card-cvv-field-container" class="col-sm-2"></div>
        </div>

        <div class="row">
          <div class="offset-md-4 col-md-8">
            <button type="button" class="btn btn-primary" id="card-field-submit-button">
              {{ 'checkout.account.submit.button.label' | translate }}
            </button>
            <button type="button" class="btn btn-secondary" (click)="cancelNewPaymentInstrument()">
              {{ 'checkout.cancel.button.label' | translate }}
            </button>
          </div>
        </div>
      </div>
      <div id="result-message"></div>
    </ng-template>
  </div>
</div>
<div *ngIf="hasError()" class="alert alert-info">
  {{ 'checkout.payment.paypal.script.error.message' | translate }}
</div>
