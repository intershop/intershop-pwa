@if (category$ | async; as category) {
  <li>
    <a class="category-image" tabindex="-1" [routerLink]="category | ishCategoryRoute" (click)="handleInputFocus()">
      <ish-category-image [category]="category" />
    </a>
    <a
      [innerHTML]="category.name | ishHighlight: (inputTerms$ | async)"
      [routerLink]="category | ishCategoryRoute"
      (click)="handleInputFocus()"
    ></a>
  </li>
}
