@if (tooltipInfo) {
  <ng-template #popover>
    <span [innerHTML]="tooltipInfo.text | translate"></span>
  </ng-template>
  <button
    class="btn btn-link details-tooltip"
    placement="top"
    type="button"
    [ngClass]="tooltipInfo.class"
    [ngbPopover]="popover"
    [popoverTitle]="tooltipInfo.title | translate"
  >
    {{ tooltipInfo.link | translate }}<i class="bi bi-info-circle-fill"></i>
  </button>
}
