<div [class.has-error]="showError" class="position-relative">
  <ng-template #fieldComponent />
  <ish-validation-icons
    *ngIf="showValidationIcons()"
    [field]="field"
    [showError]="showError"
    [ngClass]="{
      'validation-offset': field.type === 'ish-select-field' || field.type === 'ish-search-select-field',
      'd-none': field.type === 'ish-captcha-field' || field.type === 'ish-number-field',
      'validation-offset-date-picker': field.type === 'ish-date-picker-field'
    }"
  />
  <ng-container *ngIf="showError" class="invalid-feedback d-block">
    <ish-validation-message [field]="field" class="validation-message" />
  </ng-container>
</div>
