<div *ngIf="hasCaptchaError() as error; else captchafield">
  <div [class.has-error]="error" [ngClass]="field.props?.fieldClass" class="form-group">
    <ng-template #fieldComponent></ng-template>
    <div *ngIf="error" class="row form-group">
      <div class="offset-md-4 col-md-8">
        <ish-validation-message [field]="captchaField" class="validation-message" />
      </div>
    </div>
  </div>
</div>
<ng-template #captchafield>
  <div [ngClass]="field.props?.fieldClass" class="form-group">
    <ng-template #fieldComponent></ng-template>
  </div>
</ng-template>
