@if (props.customInformation) {
  <div class="d-flex align-items-center">
    <ng-template #fieldComponent />
    <span
      class="ms-2"
      data-testing-id="custom-information"
      [attr.aria-hidden]="props.customInformation.ariaHidden"
      [id]="id + '-information'"
      [ngClass]="props.customInformation.class"
    >
      {{ information | translate: args }}
    </span>
  </div>
}
