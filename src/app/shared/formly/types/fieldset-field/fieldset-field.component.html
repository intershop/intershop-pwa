<fieldset [ngClass]="props.fieldsetClass">
  <!-- prettier-ignore -->
  @if (props.legend) {
  <legend [ngClass]="props.legendClass ? props.legendClass : 'visually-hidden'">{{ props.legend | translate }}</legend>
  }
  <div [ngClass]="props.childClass">
    @for (f of field.fieldGroup; track f.id) {
    <formly-field [field]="f" />
    }
  </div>
</fieldset>
