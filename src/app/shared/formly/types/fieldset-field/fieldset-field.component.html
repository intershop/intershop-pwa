<fieldset [ngClass]="props.fieldsetClass">
  <!-- prettier-ignore -->
  <legend *ngIf="props.legend" [ngClass]="props.legendClass ? props.legendClass : 'sr-only'">{{ props.legend | translate }}</legend>
  <div [ngClass]="props.childClass">
    <formly-field *ngFor="let f of field.fieldGroup" [field]="f" />
  </div>
</fieldset>
