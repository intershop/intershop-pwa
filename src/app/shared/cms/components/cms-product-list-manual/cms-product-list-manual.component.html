@if (productSKUs?.length) {
<div
  class="product-list-container"
  [ngClass]="pagelet.stringParam('CSSClass')"
  [class.product-list-container-featured-products]="isFeaturedProductsPagelet"
>
  @if (showFeaturedProductsPlaceholder) {
  <div class="cms-product-list-manual-placeholder" aria-hidden="true">
    <ish-loading [standalone]="true" />
  </div>
  }
  @if (pagelet.stringParam('Title')) {
  <h2>{{ pagelet.stringParam('Title') }}</h2>
  }
  <ish-products-list
    [productSKUs]="productSKUs"
    [listStyle]="pagelet.stringParam('ListStyle')"
    [slideItems]="pagelet.numberParam('SlideItems')"
    [listItemStyle]="$any(pagelet.stringParam('ListItemStyle'))"
    [listItemCSSClass]="pagelet.stringParam('ListItemCSSClass')"
  />
</div>
}
