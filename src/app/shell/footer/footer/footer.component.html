<ng-container *ishHasNotRole="['APP_B2B_CXML_USER', 'APP_B2B_OCI_USER']">
  @defer (when ('storeLocator' | ishFeature)) {
  <ish-store-locator-footer />
  }
  <div class="footer">
    <div class="container">
      <div [ishServerHtml]="'footer.disclaimer' | translate" class="clearfix"></div>
      @defer {
      <ish-content-include includeId="include.footer.content.pagelet2-Include" />
      }
      <div [ishServerHtml]="'footer.copyright' | translate : { appVersion: appVersion }" class="clearfix"></div>
    </div>
  </div>
</ng-container>

@defer (when ('copilot' | ishFeature)) {
<ish-copilot />
}
