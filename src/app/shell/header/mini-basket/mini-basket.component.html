@let itemCount = itemCount$ | async;
@let basketAnimation = basketAnimation$ | async;

<div
  #miniBasketDropdown="ngbDropdown"
  class="quick-cart-link"
  ishClickOutside
  ngbDropdown
  placement="bottom-right"
  [ngClass]="{ 'd-none': view !== 'full', 'd-md-block': view !== 'small' }"
  (isClickedOutside)="collapse()"
>
  <button
    aria-haspopup="menu"
    class="btn btn-link"
    ngbDropdownToggle
    type="button"
    [attr.aria-label]="'shopping_cart.ministatus.label' | translate: { '0': itemCount }"
  >
    <i class="bi bi-cart-fill header-icon"></i>
    <span>{{ 'shopping_cart.ministatus.items.text' | translate: { '0': itemCount } }}</span>
    @if (itemTotal$ | async; as itemTotal) {
      <span> / </span> <span class="mini-cart-price">{{ itemTotal | ishPrice }}</span>
    }
  </button>

  <div class="mini-cart" ngbDropdownMenu>
    <ish-lazy-mini-basket-content />
  </div>
</div>

<!-- Mobile -->
@if (view === 'small') {
  @if (itemCount) {
    <a
      class="item-count-container position-relative sticky-header-icon"
      routerLink="/basket"
      [attr.aria-label]="'shopping_cart.ministatus.label' | translate: { '0': itemCount }"
    >
      <i class="bi bi-cart-fill header-icon"></i>
      <span class="badge rounded-pill" [ngClass]="basketAnimation">{{ itemCount }}</span>
    </a>
  } @else {
    <a
      #p="ngbPopover"
      class="item-count-container position-relative sticky-header-icon"
      placement="bottom-end"
      tabindex="0"
      triggers="manual"
      [attr.aria-label]="'shopping_cart.ministatus.label' | translate: { '0': itemCount }"
      [autoClose]="'outside'"
      [ngbPopover]="'shopping_cart.ministatus.empty_cart.text' | translate"
      (click)="p.open()"
      (keyup.enter)="p.open()"
    >
      <i class="bi bi-cart-fill header-icon"></i>
      <span class="badge rounded-pill" [ngClass]="basketAnimation">0</span>
    </a>
  }
}

<!-- dummy element tracking basket loading for cypress tests -->
@if (basketLoading$ | async) {
  <span class="loading" style="display: none"></span>
}
