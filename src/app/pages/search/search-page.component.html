@if (searchTerm$ | async; as searchTerm) {
  <!-- search result with products -->
  @if ((numberOfItems$ | async) || (filterParams$ | async)) {
    <ish-search-result [deviceType]="deviceType$ | async" [searchTerm]="searchTerm" />
  } @else {
    @if ((searchLoading$ | async) === false) {
      <ish-search-no-result [searchTerm]="searchTerm" />
    }
  }
  <!-- empty search result -->
  @if (searchLoading$ | async) {
    <ish-loading />
  }
}
