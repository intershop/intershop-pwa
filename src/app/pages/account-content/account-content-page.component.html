@let contentPage = contentPage$ | async;
@if (contentPage?.pageletIDs?.length) {
  <!-- the 'pageid' attribute is needed for the Design View and should not be removed -->
  <ish-content-pagelet [attr.pageid]="contentPage.id" [pageletId]="contentPage.pageletIDs[0]" />
}
@if (contentPageLoading$ | async) {
  <ish-loading />
}
