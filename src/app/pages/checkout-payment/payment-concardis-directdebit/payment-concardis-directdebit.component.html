<formly-form [fields]="fieldConfig" [form]="parameterForm" [model]="model" [options]="options" />

@if (paymentMethod) {
  <ish-payment-save-checkbox [form]="parameterForm" [paymentMethod]="paymentMethod" />
}

<div class="row">
  <div class="offset-md-4 col-md-8">
    <button
      class="btn btn-primary"
      type="button"
      [disabled]="formSubmitted && parameterForm.invalid"
      (click)="submitNewPaymentInstrument()"
    >
      {{ 'checkout.account.submit.button.label' | translate }}
    </button>
    <button class="btn btn-secondary" type="button" (click)="cancelNewPaymentInstrument()">
      {{ 'checkout.cancel.button.label' | translate }}
    </button>
  </div>
</div>
