<formly-form [fields]="fields" [form]="form" [model]="model" />

@if (paymentMethod) {
  <ish-payment-save-checkbox [form]="parentForm" [paymentMethod]="paymentMethod" />
}

<div class="row">
  <div class="offset-md-4 col-md-8">
    <button class="btn btn-primary" type="submit" [disabled]="submitDisabled" (click)="submitParameterForm()">
      {{ 'checkout.account.submit.button.label' | translate }}
    </button>
    <button class="btn btn-secondary" type="button" (click)="cancelNewPaymentInstrument()">
      {{ 'checkout.cancel.button.label' | translate }}
    </button>
  </div>
</div>
