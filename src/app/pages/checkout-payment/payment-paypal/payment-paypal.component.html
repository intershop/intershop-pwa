<div *ngIf="paypalClientId$ | async" class="row">
  <div class="col-12 col-md-6">
    <div id="paypal-buttons-container"></div>
    <div id="paypal-messages-container"></div>
  </div>
  <div *ngIf="scriptLoaded$ | async" class="d-flex col-12 align-items-center my-4">
    <div class="flex-fill border-top border-secondary"></div>
    <span class="mx-3 font-weight-bold">Or</span>
    <div class="flex-fill border-top border-secondary"></div>
  </div>
</div>
