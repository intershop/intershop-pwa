@if (fields$ | async; as fields) {
  <form [formGroup]="form" (ngSubmit)="submitForm()">
    <div>
      <formly-form [form]="form" [fields]="[fields[0]]" [model]="model$ | async" />
    </div>
    <div [ngbCollapse]="formIsCollapsed">
      <formly-form [form]="form" [fields]="fields.slice(1)" [model]="model$ | async" />
    </div>
    <div class="row mb-4">
      <div class="col-md-4 d-flex align-items-center">
        <button
          type="button"
          class="btn btn-link btn-link-with-icon"
          (click)="expandForm()"
          [attr.aria-expanded]="!formIsCollapsed"
        >
          @if (formIsCollapsed) {
            {{ 'account.order_history.filter.show' | translate }}<i class="bi bi-chevron-down"></i>
          } @else {
            {{ 'account.order_history.filter.hide' | translate }}<i class="bi bi-chevron-up"></i>
          }
        </button>
      </div>
      <div class="col-md-8 text-end">
        <button type="reset" class="btn btn-link" [hidden]="!showResetButton()" (click)="resetForm()">
          {{ 'account.order_history.filter.clear' | translate }}
        </button>
        <button type="submit" class="btn btn-primary me-0">
          {{ 'account.order_history.filter.apply' | translate }}
        </button>
      </div>
    </div>
  </form>
}
