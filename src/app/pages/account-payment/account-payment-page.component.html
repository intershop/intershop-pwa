<div class="clearfix">
  <ng-container>
    <h1>{{ 'account.payment.heading' | translate }}</h1>

    <ish-error-message [error]="error$ | async" />

    <ish-account-payment [paymentMethods]="paymentMethods$ | async" [user]="user$ | async" />
  </ng-container>

  @if (loading$ | async) {
    <ish-loading />
  }
</div>
