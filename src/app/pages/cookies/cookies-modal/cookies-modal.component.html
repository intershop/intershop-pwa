<div class="cookies-modal">
  <div class="modal-header">
    <h2>{{ 'cookie.preferences.heading' | translate }}</h2>
    <button type="button" class="btn-close" [title]="'dialog.close.text' | translate" (click)="hide()"></button>
  </div>

  <!-- $any is used here to suppress strict template type checking errors related to the keyvalue pipe -->
  <div class="modal-body">
    <div *ngFor="let option of cookieConsentOptions?.options | keyvalue : unsorted" class="cookie-option">
      <label class="mb-2">
        <input
          type="checkbox"
          class="form-check-input mt-0"
          [checked]="$any(option.value).required || cookieConsentSettings?.enabledOptions.includes(option.key)"
          [disabled]="$any(option.value).required"
          (change)="selectedIds[$any(option.key)] = !selectedIds[$any(option.key)]"
        />
        <span>{{ $any(option.value).name | translate }}</span>
      </label>
      <p>{{ $any(option.value).description | translate }}</p>
    </div>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-primary" (click)="acceptAll()">
      {{ 'cookies.modal.accept_all' | translate }}
    </button>
    <button type="button" class="btn btn-secondary" (click)="submit()">
      {{ 'cookies.modal.save' | translate }}
    </button>
    <button type="button" class="btn btn-secondary" (click)="hide()">
      {{ 'cookies.modal.cancel' | translate }}
    </button>
  </div>
</div>
