<form
  #form="ngForm"
  class="form-horizontal"
  ishFormSubmit
  novalidate
  [formGroup]="withdrawalForm"
  (ngSubmit)="submitForm()"
>
  <formly-form [fields]="fields$ | async" [form]="withdrawalForm" [model]="model" />
  <div class="row">
    <div class="offset-md-4 col-md-8">
      <button class="btn btn-primary" type="submit" [disabled]="withdrawalForm.invalid && form.submitted">
        {{ submitButtonLabel | translate }}
      </button>
    </div>
  </div>
</form>
