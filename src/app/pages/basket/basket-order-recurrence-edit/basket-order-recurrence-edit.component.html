@if (showRecurrenceOptions$ | async) {
  <div id="order-recurrence">
    <fieldset class="mt-1">
      <legend class="visually-hidden">{{ 'order.recurrence.form.legend' | translate }}</legend>
      <input
        class="form-check-input"
        id="order_recurrence_single"
        name="order_recurrence"
        type="radio"
        value="single-order"
        [checked]="!recurrence"
        (change)="updateOrderRecurrence(null)"
      />
      <label class="form-check-label" for="order_recurrence_single">{{
        'order.recurrence.single_order.label' | translate
      }}</label>
      <div class="mt-2">
        <input
          class="form-check-input"
          data-testing-id="enable-recurring-order"
          id="order_recurrence_recurring"
          name="order_recurrence"
          type="radio"
          value="recurring-order"
          [checked]="!!recurrence"
          (change)="updateOrderRecurrence(defaultRecurrence)"
        />
        <label class="form-check-label" for="order_recurrence_recurring">{{
          'order.recurrence.recurring_order.label' | translate
        }}</label>
      </div>
      <ish-content-include includeId="include.basket.recurringorder.ordersummary.pagelet2-Include" />
    </fieldset>
    <div aria-live="polite" class="visually-hidden" role="text">
      {{
        (!!recurrence ? 'order.recurrence.form.announcement.open' : 'order.recurrence.form.announcement.close')
          | translate
      }}
    </div>
    <div
      aria-labelledby="order_recurrence_recurring"
      class="mt-3"
      id="order_recurrence_form"
      [ngbCollapse]="!recurrence"
    >
      <form [formGroup]="form">
        <formly-form [fields]="fields" [form]="form" [model]="model" />
      </form>
    </div>
  </div>
}
