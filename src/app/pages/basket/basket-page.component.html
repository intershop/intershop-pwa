<div class="marketing-area">
  <ish-content-include includeId="include.basket.base.top.pagelet2-Include" />
</div>

@let basketError = basketError$ | async;
@let basketLoading = basketLoading$ | async;
@if (basket$ | async; as basket) {
  @if (basket.lineItems.length) {
    <ish-shopping-basket [basket]="basket" [error]="basketError" [loading]="basketLoading" (nextStep)="nextStep()" />
  } @else {
    <ish-shopping-basket-empty [error]="basketError" />
    @if (basketLoading) {
      <ish-loading />
    }
  }
} @else {
  <ish-shopping-basket-empty [error]="basketError" />
  @if (basketLoading) {
    <ish-loading />
  }
}

<ish-lazy-recently-viewed />

<div class="marketing-area">
  <ish-content-include includeId="include.basket.base.bottom.pagelet2-Include" />
</div>
