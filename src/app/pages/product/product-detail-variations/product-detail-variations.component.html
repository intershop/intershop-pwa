<div *ngIf="visible$ | async" class="product-variation-container">
  <ng-container *ngIf="'preferences.ChannelPreferences.EnableAdvancedVariationHandling' | ishServerSetting">
    <ish-product-variation-display />
    <ish-product-master-link />
  </ng-container>
  <ng-container *ngIf="('preferences.ChannelPreferences.EnableAdvancedVariationHandling' | ishServerSetting) === false">
    <ish-product-variation-select />
  </ng-container>
</div>
