@if (hasVariations$ | async) {
  <a id="variation-list-top" title="top"></a>
  <ish-skip-content-link linkText="common.skip_content.link.text.filter">
    <ish-filter-navigation fragmentOnRouting="variation-list-top" orientation="horizontal" />
  </ish-skip-content-link>
  <ish-product-listing
    fragmentOnRouting="variation-list-top"
    mode="paging"
    [categoryId]="categoryId$ | async"
    [productListingId]="{ type: 'master', value: sku$ | async }"
  />
}
