<ish-product-detail-actions />

@if (product$ | async; as product) {
  <div class="row product-details">
    <div class="col-12 col-md-6 col-lg-8"><ish-product-images /></div>
    <div class="col-12 col-md-6 col-lg-4">
      <ish-product-rating *ishFeature="'rating'" />
      <h1>
        <span itemprop="name"><ish-product-name [link]="false" /></span>
      </h1>
      <div class="product-info">
        <ish-product-brand />
        <ish-product-id />
        <ish-product-promotion />
        <div class="price-container" itemprop="offers" itemscope itemtype="http://schema.org/Offer">
          <ish-product-price [showInformationalPrice]="true" [showPriceSavings]="true" />
          @defer (when 'payment.paypal.payLaterPreferences.PayLaterMessagingProductDetailsEnabled' | ishServerSetting) {
            <ish-payment-paypal pageType="product-details" />
          }
        </div>
        <ish-product-inventory [displayType]="'extended'" />
        <ish-product-shipment />
        <ish-product-detail-variations />
        <div class="row form-group">
          <div class="col-6">
            <ish-product-quantity-label for="product-detail-quantity" />
          </div>
          <div class="col-6">
            <ish-product-quantity elementId="product-detail-quantity" />
          </div>
        </div>
        <div class="d-grid">
          <ish-product-add-to-basket [cssClass]="'btn-lg w-100'" />
        </div>
        @defer (when 'orderTemplates' | ishFeature) {
          <div class="d-grid">
            <ish-product-add-to-order-template [cssClass]="'btn btn-secondary'" />
          </div>
        }
        @defer (when 'quoting' | ishFeature) {
          <div class="d-grid">
            <ish-product-add-to-quote [cssClass]="'btn btn-secondary'" />
          </div>
        }
        @defer (when 'productNotifications' | ishFeature) {
          <div class="d-grid">
            <ish-product-notification-edit cssClass="btn btn-secondary" displayType="button" />
          </div>
        }
        <ish-product-warranty (submitWarranty)="setSelectedWarranty($event)" />
      </div>
      <!-- DISABLED VIEW CONTEXT --
      <div class="marketing-area">
        <ish-content-viewcontext
          viewContextId="viewcontext.include.product.productinfo"
          [callParameters]="{ Product: product.sku }"
          />
      </div>
      -- DISABLED VIEW CONTEXT -->
    </div>
  </div>
}
