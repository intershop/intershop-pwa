<div *ngIf="product$ | async as product" class="section">
  <nav
    ngbNav
    #nav="ngbNav"
    class="nav-tabs w-100"
    [(activeId)]="active"
    [attr.aria-label]="'product.detail.infos.aria_label' | translate"
  >
    <!-- Description -->
    <ng-container [ngbNavItem]="'DESCRIPTION'">
      <a ngbNavLink data-testing-id="product-description-tab">{{ 'product.description.heading' | translate }}</a>
      <ng-template ngbNavContent>
        <div [ishServerHtml]="product.longDescription"></div>
      </ng-template>
    </ng-container>

    <!-- Details -->
    <ng-container *ngIf="product.attributes?.length" [ngbNavItem]="'DETAILS'">
      <a ngbNavLink>{{ 'product.details.heading' | translate }}</a>
      <ng-template ngbNavContent>
        <ish-product-attributes [product]="product" />
      </ng-template>
    </ng-container>

    <!-- Documents -->
    <ng-container *ngIf="product.attachments?.length" [ngbNavItem]="'ATTACHMENTS'">
      <a ngbNavLink>{{ 'product.attachments.heading' | translate }}</a>
      <ng-template ngbNavContent>
        <ish-product-attachments />
      </ng-template>
    </ng-container>

    <!-- Reviews -->
    <ng-container *ngIf="(isVariationMaster$ | async) === false">
      <ng-container *ishFeature="'rating'" [ngbNavItem]="'REVIEWS'">
        <a ngbNavLink data-testing-id="product-reviews-tab"
          >{{ 'product.reviews.heading' | translate }} ({{ product.numberOfReviews }})</a
        >
        <ng-template ngbNavContent>
          <ish-lazy-product-reviews />
        </ng-template>
      </ng-container>
    </ng-container>
  </nav>

  <div [ngbNavOutlet]="nav"></div>
</div>
