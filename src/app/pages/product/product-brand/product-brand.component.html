<ng-container *ishProductContextAccess="let product = product">
  @if (product.manufacturer; as manufacturer) {
    <div class="product-brand">
      <a
        [attr.aria-label]="'product.details.company.label' | translate: { '0': manufacturer }"
        [routerLink]="['/search', manufacturer]"
      >
        <span itemprop="brand">{{ manufacturer }}</span>
      </a>
    </div>
  }
</ng-container>
