@if (category$ | async; as category) {
  <div class="category-name" [attr.data-testing-id]="'category-' + category.uniqueId">
    <a tabindex="-1" [routerLink]="category | ishCategoryRoute">
      <ish-category-image [category]="category" [loading]="loading" />
    </a>
    <a class="link-decoration-hover" [routerLink]="category | ishCategoryRoute">
      <h2 class="h3">{{ category.name }}</h2>
    </a>
  </div>
}
