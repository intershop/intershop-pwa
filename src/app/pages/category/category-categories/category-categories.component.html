<div class="category-page" [attr.data-testing-id]="category.uniqueId">
  <!-- DISABLED VIEW CONTEXT --
  <div class="marketing-area">
    @if (category.categoryRef) {
      <ish-content-viewcontext
        viewContextId="viewcontext.include.category.base.top"
        [callParameters]="{ Category: category.categoryRef }"
        />
    }
  </div>
  -- DISABLED VIEW CONTEXT -->
  <div class="row">
    <div class="col-md-3">
      <ish-skip-content-link skipToElementId="nav-breadcrumbs" linkText="category.navigation.skip_content.link.text" />
      <div class="navigation-panel" [ngbCollapse]="isCollapsed">
        <nav [attr.aria-label]="'category.navigation.aria_label' | translate">
          <ish-category-navigation [uniqueId]="category.categoryPath[0]" />
        </nav>
        @if ('payment.paypal.payLaterPreferences.PayLaterMessagingCategoryEnabled' | ishServerSetting) {
          <div class="mt-2">
            <ish-payment-paypal pageType="product-listing" />
          </div>
        }
        <!-- DISABLED VIEW CONTEXT --
        <div class="marketing-area">
          @if (category.categoryRef) {
            <ish-content-viewcontext
              viewContextId="viewcontext.include.category.navigation"
              [callParameters]="{ Category: category.categoryRef }"
              />
          }
        </div>
        -- DISABLED VIEW CONTEXT -->
      </div>
      <button
        type="button"
        class="d-md-none mobile-filter-toggle btn btn-link btn-link-action link-decoration-hover"
        (click)="toggle()"
      >
        {{ 'search.mobile.filter.trigger' | translate }}
        <i class="bi" [ngClass]="isCollapsed ? 'bi-chevron-down' : 'bi-chevron-up'"></i>
      </button>
    </div>

    <div class="col-md-9">
      <ish-breadcrumb />
      <h1>{{ category.name }}</h1>

      <div class="marketing-area">
        @if (category.categoryRef) {
          <ish-content-viewcontext
            viewContextId="viewcontext.include.category.content.top"
            [callParameters]="{ Category: category.categoryRef }"
          />
        }
      </div>

      <ish-category-list [categories]="category.children" />

      <div class="marketing-area">
        @if (category.categoryRef) {
          <ish-content-viewcontext
            viewContextId="viewcontext.include.category.content.bottom"
            [callParameters]="{ Category: category.categoryRef }"
          />
        }
      </div>
    </div>
  </div>
  <!-- DISABLED VIEW CONTEXT --
  <div class="marketing-area">
    @if (category.categoryRef) {
      <ish-content-viewcontext
        viewContextId="viewcontext.include.category.base.bottom"
        [callParameters]="{ Category: category.categoryRef }"
        />
    }
  </div>
  -- DISABLED VIEW CONTEXT -->
</div>
