@for (field of field?.fieldGroup; track field.id; let i = $index) {
  <span [attr.data-testing-id]="'oci-config-mapping-line-' + i">
    <formly-field [field]="field" />
  </span>
}
<button class="btn btn-link btn-link-action" data-testing-id="add-config-line" type="button" (click)="addRow()">
  {{ 'account.punchout.configuration.form.add_row.link' | translate }}
</button>
