<form
  [formGroup]="quickOrderForm"
  ishFormSubmit
  #quickOrderIDForm="ngForm"
  (ngSubmit)="onAddProducts()"
  [attr.aria-label]="'quickorder.page.form.label' | translate"
>
  <div class="list-header d-sm-flex">
    <div class="col-md-6 list-header-item no-seperator">{{ 'quickorder.page.product.id' | translate }}</div>
    <div class="col-md-2 list-header-item no-seperator">{{ 'quickorder.page.product.quantity' | translate }}</div>
  </div>

  <formly-form [model]="model" [fields]="fields" [options]="options" [form]="quickOrderForm" class="pt-1" />
  <div
    id="submit-button-help"
    aria-live="polite"
    class="sr-only"
    *ngIf="(quickOrderForm.pristine || quickOrderForm.invalid || quickOrderForm.pending) && quickOrderIDForm.submitted"
  >
    {{ 'quickorder.page.add.cart.disabled' | translate }}
  </div>
  <button
    type="submit"
    class="btn btn-primary"
    [attr.aria-describedby]="
      (quickOrderForm.pristine || quickOrderForm.invalid || quickOrderForm.pending) && quickOrderIDForm.submitted
        ? 'submit-button-help'
        : null
    "
    data-testing-id="add-form-to-cart"
  >
    {{ 'quickorder.page.add.cart' | translate }}
  </button>

  <button type="button" class="btn btn-link" (click)="reset()">
    {{ 'quickorder.page.reset.form' | translate }}
  </button>
</form>
