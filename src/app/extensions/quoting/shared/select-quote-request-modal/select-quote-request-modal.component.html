<div class="modal-header">
  <h2 class="modal-title" id="select-quote-request-modal-title">
    {{ 'quote.select_quote_request.modal.heading' | translate }}
  </h2>
  <button class="btn-close" type="button" [title]="'dialog.close.text' | translate" (click)="hide()"></button>
</div>

<form #form="ngForm" ishFormSubmit novalidate [formGroup]="formGroup" (ngSubmit)="submitForm()">
  <div class="modal-body">
    <formly-form [fields]="fieldConfig$ | async" [form]="formGroup" />
  </div>
  <div class="modal-footer">
    <button
      class="btn btn-primary"
      data-testing-id="submit-quote-request-selection"
      type="submit"
      [disabled]="formGroup.invalid && form.submitted"
    >
      {{ 'quote.select_quote_request.modal.add_to_quote.button.label' | translate }}
    </button>
    <button class="btn btn-secondary" type="button" (click)="hide()">
      {{ 'quote.select_quote_request.modal.cancel.button.label' | translate }}
    </button>
  </div>
</form>
