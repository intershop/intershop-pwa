@let productCompareCount = productCompareCount$ | async;
<a
  class="compare-status item-count-container"
  rel="nofollow"
  routerLink="/compare"
  [attr.aria-label]="'product.compare.label' | translate: { '0': productCompareCount }"
>
  <i class="bi bi-arrow-left-right header-icon"></i>
  <span class="badge rounded-pill" data-testing-id="product-compare-count">{{ productCompareCount }}</span>
  <span [ngClass]="{ 'd-none': view === 'auto' || view === 'small', 'd-md-inline': view === 'auto' }">{{
    'product.compare.link' | translate
  }}</span>
</a>
