<ng-template #modal let-addModal>
  <div class="modal-header">
    <h2 class="modal-title" id="order-template-preferences-title">{{ orderTemplate()?.title }}</h2>
    <button class="btn-close" type="button" [title]="'dialog.close.text' | translate" (click)="hide()"></button>
  </div>

  <div class="modal-body order-template-add-to-cart-modal">
    <div class="list-header d-flex flex-row justify-content-between">
      <div class="list-header-item ms-2">
        {{ 'account.order_template.table.header.item' | translate }}
      </div>
      <div class="list-header-item me-2">
        {{ 'shopping_cart.qty.heading' | translate }}
      </div>
    </div>
    <div class="list-body">
      @for (item of orderTemplateItems$ | async; track item.sku; let i = $index) {
        <div class="list-item-row list-item-row-big">
          <ish-order-template-add-to-cart-item
            ishProductContext
            [currentOrderTemplate]="orderTemplate()"
            [orderTemplateItemData]="item"
            [propagateIndex]="i"
            [quantity]="item.desiredQuantity.value"
            [sku]="item.sku"
          />
        </div>
      }
    </div>
  </div>

  <div class="modal-footer">
    <ish-product-add-to-basket [cssClass]="'mt-1'" (click)="hide()" />
    <button class="btn btn-secondary" type="button" (click)="hide()">
      {{ 'account.cancel.button.label' | translate }}
    </button>
  </div>
</ng-template>
