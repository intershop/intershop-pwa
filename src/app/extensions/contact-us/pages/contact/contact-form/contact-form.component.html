<p>{{ 'helpdesk.contactus.prolog' | translate }}</p>
<p aria-hidden="true" class="indicates-required">
  <span class="required">*</span>{{ 'helpdesk.contactus.indicates' | translate }}
</p>
<form
  #form="ngForm"
  class="form-horizontal"
  ishFormSubmit
  novalidate
  [formGroup]="contactForm"
  (ngSubmit)="submitForm()"
>
  <formly-form [fields]="fields$ | async" [form]="contactForm" [model]="model$ | async" />

  <div class="row form-group">
    <div class="offset-md-4 col-md-8">
      @if (form.submitted && form.invalid) {
        <div aria-live="polite" class="visually-hidden" id="submit-button-help">
          {{ 'form.submit.validation.message' | translate }}
        </div>
      }
      <input
        class="btn btn-primary"
        data-testing-id="submitContact"
        type="submit"
        [attr.aria-describedby]="form.submitted && form.invalid ? 'submit-button-help' : null"
        value="{{ 'helpdesk.contactus.submit' | translate }}"
      />
    </div>
  </div>
</form>
