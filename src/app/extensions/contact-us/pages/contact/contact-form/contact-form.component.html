<p>{{ 'helpdesk.contactus.prolog' | translate }}</p>
<p class="indicates-required" aria-hidden="true">
  <span class="required">*</span>{{ 'helpdesk.contactus.indicates' | translate }}
</p>
<form
  [formGroup]="contactForm"
  ishFormSubmit
  #form="ngForm"
  (ngSubmit)="submitForm()"
  class="form-horizontal"
  novalidate
>
  <formly-form [form]="contactForm" [fields]="fields$ | async" [model]="model$ | async" />

  <div class="row form-group">
    <div class="offset-md-4 col-md-8">
      <div *ngIf="form.submitted && form.invalid" id="submit-button-help" aria-live="polite" class="visually-hidden">
        {{ 'forms.button.label.disabled' | translate }}
      </div>
      <input
        type="submit"
        class="btn btn-primary"
        [attr.aria-describedby]="form.submitted && form.invalid ? 'submit-button-help' : null"
        value="{{ 'helpdesk.contactus.submit' | translate }}"
        data-testing-id="submitContact"
      />
    </div>
  </div>
</form>
