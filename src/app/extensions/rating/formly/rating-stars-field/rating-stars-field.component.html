<div class="pt-1" data-testing-id="rating-stars-field">
  <ngb-rating
    [max]="5"
    [rate]="field.formControl.value || 0"
    [starTemplate]="starTemplate"
    (rateChange)="field.formControl.setValue($event)"
  />
</div>

<ng-template #starTemplate let-fill="fill">
  <i aria-hidden="true" [class]="fill === 100 ? 'bi bi-star-fill' : 'bi bi-star'"></i>
</ng-template>
