# Multi-Theme Setup: One image with all themes, one SSR process per container.
# Each container has all themes' code/assets but only runs one theme.
# Static assets can be served by any container (round robin).
#
# Usage:
#   export ICM_BASE_URL=https://develop.icm.intershop.de
#   docker compose -f docker-compose.multi-theme.yml up --build

x-ssr-defaults: &ssr-defaults
  image: intershophub/intershop-pwa-ssr
  build:
    context: .
    args:
      activeThemes: b2c,b2b
  environment: &ssr-env
    ICM_BASE_URL: ${ICM_BASE_URL:-https://develop.icm.intershop.de}
    SOURCE_MAPS: 'true'
    LOGLEVEL: ${LOGLEVEL:-error}
    LOGFORMAT: ${LOGFORMAT:-json}
  expose:
    - '4200'
  restart: unless-stopped

services:
  ssr-b2c:
    <<: *ssr-defaults
    command: ['node', 'dist/b2c/run-standalone']

  ssr-b2b:
    <<: *ssr-defaults
    command: ['node', 'dist/b2b/run-standalone']

  nginx:
    image: intershophub/intershop-pwa-nginx
    build: nginx
    depends_on:
      - ssr-b2c
      - ssr-b2b
    ports:
      - '4200:80'
    environment:
      UPSTREAM_PWA: 'http://ssr-b2c:4200'
      THEME_UPSTREAMS: 'b2c=ssr-b2c:4200,b2b=ssr-b2b:4200'
      ASSETS_UPSTREAM: 'ssr-b2c:4200,ssr-b2b:4200'
      ICM_BASE_URL: ${ICM_BASE_URL:-https://develop.icm.intershop.de}
      NGINX_ENTRYPOINT_QUIET_LOGS: ANYVALUE
      CACHE: 0
      # Multi-channel config: path-based routing for b2b and b2c
      MULTI_CHANNEL: |
        .+:
          - baseHref: /b2b
            channel: default
            theme: b2b
          - baseHref: /
            channel: default
            theme: b2c
    restart: unless-stopped
