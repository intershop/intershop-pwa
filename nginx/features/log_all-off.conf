# LOG_ALL=off: Only allow logging of 4xx/5xx status codes (subject to LOGLEVEL filtering)
map $status $log_all_loggable {
    ~^[23]  0;
    default 1;
}

# Combine LOG_ALL and LOGLEVEL: both must allow logging
# $loggable = 1 only if both $log_all_loggable=1 AND $loglevel_loggable=1
map $log_all_loggable$loglevel_loggable $loggable {
    "11"    1;
    default 0;
}
