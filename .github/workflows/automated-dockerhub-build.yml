# This workflow builds the Docker images using Docker Buildx
# and pushes it to Docker Hub upon pushes to the develop branch or release source tags.
name: Build Dockerhub Images

on:
  # This will run the workflow on pushes to develop and numeric version tags.
  push:
    branches:
      - develop
      - feature/migrate-dockerhub-autobuild
    tags:
      - '[0-9]+.[0-9]+.[0-9]+-[0-9A-Za-z.-]+'

env:
  # Define the context path and Dockerfile path.

  # DOCKER_SSR_CONTEXT_PATH should be set to the build context for the SSR image.
  DOCKER_SSR_CONTEXT_PATH: .

  # DOCKER_SSR_DOCKERFILE_PATH should be set to the Dockerfile location for the SSR image.
  DOCKER_SSR_DOCKERFILE_PATH: Dockerfile

  # DOCKER_SSR_REPOSITORY_NAME should be set to the name of the Docker Hub repository where the SSR image will be pushed to.
  DOCKER_SSR_REPOSITORY_NAME: intershophub/intershop-pwa-ssr

  # NGINX image build context and Dockerfile location.
  DOCKER_NGINX_CONTEXT_PATH: nginx
  DOCKER_NGINX_DOCKERFILE_PATH: nginx/Dockerfile

  # Docker Hub repository for the nginx image.
  DOCKER_NGINX_REPOSITORY_NAME: intershophub/intershop-pwa-nginx

jobs:
  build_ssr:
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSR paths
        id: paths_ssr
        run: |
          echo "build_path=./${{ env.DOCKER_SSR_CONTEXT_PATH }}" >> $GITHUB_OUTPUT
          echo "dockerfile_path=${{ env.DOCKER_SSR_DOCKERFILE_PATH }}" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v6

      # Configure Docker image tags based on Git references.
      # The configuration here will push the `develop` branch as `latest`
      # and map source tags like `1.2.3` to image tags like `release-1.2.3`.
      # See https://github.com/docker/metadata-action
      - name: Generate Docker image tags (ssr)
        id: meta_ssr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_SSR_REPOSITORY_NAME }}
          tags: |
            # set latest tag for develop branch
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'develop') }}
            # map git tag 1.2.3 to docker tag release-1.2.3
            type=ref,event=tag,prefix=release-

      # Configure Docker Buildx.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to Docker Hub with credentials stored in GitHub Secrets.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build, tag, and push the SSR Docker image
      - name: Build and tag SSR Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.paths_ssr.outputs.build_path }}
          file: ${{ steps.paths_ssr.outputs.dockerfile_path }}
          push: false
          tags: ${{ steps.meta_ssr.outputs.tags }}

  build_nginx:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Configure Docker image tags based on Git references.
      # The configuration here will push the `develop` branch as `latest`
      # and map source tags like `1.2.3` to image tags like `release-1.2.3`.
      # See https://github.com/docker/metadata-action
      - name: Generate Docker image tags (nginx)
        id: meta_nginx
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_NGINX_REPOSITORY_NAME }}
          tags: |
            # set latest tag for develop branch
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'develop') }}
            # map git tag 1.2.3 to docker tag release-1.2.3
            type=ref,event=tag,prefix=release-

      # Configure Docker Buildx.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to Docker Hub with credentials stored in GitHub Secrets.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build, tag, and push the nginx Docker image
      - name: Build and tag nginx Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ env.DOCKER_NGINX_CONTEXT_PATH }}
          file: ${{ env.DOCKER_NGINX_DOCKERFILE_PATH }}
          push: false
          tags: ${{ steps.meta_nginx.outputs.tags }}
