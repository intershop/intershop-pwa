name: Lighthouse Accessibility

on:
  workflow_dispatch:
  push:
    branches:
      - develop
    paths:
      - src/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  lighthouse-accessibility:
    name: Lighthouse Accessibility
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2
        id: chrome
        with:
          chrome-version: stable
          install-dependencies: true

      - name: Install dependencies
        run: npm ci

      - name: Build PWA
        run: npm run build

      - name: Start PWA
        run: npm run serve &

      # Run Lighthouse accessibility audits
      - name: Run Lighthouse CI accessibility audits (desktop + mobile)
        id: run-lighthouse
        env:
          LHCI_COLLECT__CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          echo "Lighthouse CI (desktop)"
          npx lhci autorun --config=.github/lighthouse/configurations/accessibility-desktop.lighthouserc.json
          mv .lighthouseci lighthouse-desktop-accessibility

          echo "Lighthouse CI (mobile)"
          npx lhci autorun --config=.github/lighthouse/configurations/accessibility-mobile.lighthouserc.json
          mv .lighthouseci lighthouse-mobile-accessibility

      - name: Upload accessibility Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lighthouse-reports-accessibility
          path: |
            lighthouse-desktop-accessibility
            lighthouse-desktop-accessibility
          if-no-files-found: warn

      # Generate markdown report with accessibility results
      # The workflow will fail at the end based on the allPass output (checked via step output)
      - name: Generate accessibility results markdown and check thresholds
        if: always()
        id: generate-results
        run: |
          node .github/lighthouse/scripts/lighthouse-accessibility.js

          # Write accessibility results to GitHub Step Summary
          cat lighthouse-accessibility.md >$GITHUB_STEP_SUMMARY

          # Set threshold check result as output for workflow
          echo "allPass=$(cat allPass.txt)" >> $GITHUB_OUTPUT

      - name: Find pull request (if the workflow was triggered from a branch context)
        uses: juliangruber/find-pull-request-action@v1
        id: find-pull-request
        with:
          branch: ${{ github.ref_name }}

      - name: Comment accessibility results on pull request
        if: steps.find-pull-request.outputs.number != ''
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ steps.find-pull-request.outputs.number }}
          body-file: lighthouse-accessibility.md

      - name: Fail if accessibility scores below thresholds
        if: steps.generate-results.outputs.allPass == 'false'
        run: |
          echo "❌ Accessibility check failed: One or more pages scored below their required thresholds"
          exit 1
