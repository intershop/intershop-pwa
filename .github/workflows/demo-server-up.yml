name: Demo Server

on:
  workflow_dispatch:
    inputs:
      icm_base_url:
        description: 'ICM Base URL'
        required: false
        default: 'https://review.icm.intershop.de'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# CONFIGURATION
# For help, go to https://github.com/Azure/Actions
#
# 1. Set up the following secrets in your repository:
#   AZURE_WEBAPP_PUBLISH_PROFILE
#
# 2. Change these variables for your configuration:
env:
  AZURE_DEMO_RESOURCEGROUP: pwa-gh-review
  AZURE_WEBAPP_NAME: '' # Set dynamically in "Set Environment" step

jobs:
  build-and-deploy:
    if: github.event.repository.full_name == 'intershop/intershop-pwa'
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Publish SSR image to Registry
        id: ssr
        uses: elgohr/Publish-Docker-Github-Action@v5
        env:
          serviceWorker: false
          displayVersion: ${{ github.sha }}
          testing: true
          NODE_OPTIONS: --max-old-space-size=8192
        with:
          name: intershop-pwa-ssr
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
          registry: ${{ secrets.DOCKER_REGISTRY }}
          buildargs: serviceWorker,displayVersion,testing

      - name: Publish NGINX image to Registry
        id: nginx
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: intershop-pwa-nginx
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
          registry: ${{ secrets.DOCKER_REGISTRY }}
          context: nginx

      - name: Set Environment
        run: |
          echo "DOCKER_IMAGE_SSR=${{ steps.ssr.outputs.digest }}" >> $GITHUB_ENV
          echo "DOCKER_IMAGE_NGINX=${{ steps.nginx.outputs.digest }}" >> $GITHUB_ENV
          echo "ICM_BASE_URL=${{ github.event.inputs.icm_base_url }}" >> $GITHUB_ENV
          printf 'AZURE_WEBAPP_NAME=%.60s' "${{ env.AZURE_DEMO_RESOURCEGROUP }}-$( echo ${{ github.event.ref }} | sed -e 's/refs\/heads\///' | sed -e 's/[^a-zA-Z0-9-]/-/g' )" >> $GITHUB_ENV

      - name: Login via Azure CLI
        run: az login --service-principal --username ${{ secrets.AZURE_SP_USERNAME }} --password ${{ secrets.AZURE_SP_PASSWORD }} --tenant ${{ secrets.AZURE_SP_TENANT }}

      - name: Create or Update containerized WebApp
        env:
          APP: ${{ env.AZURE_WEBAPP_NAME }}
          GROUP: ${{ env.AZURE_DEMO_RESOURCEGROUP }}
        run: |
          set -ex

          # Node.js + npm should be preinstalled on ubuntu-latest (can be used since version is not important here)
          npm install yaml --no-audit --no-fund
          node ./.github/scripts/demo-server-up.mjs $ICM_BASE_URL $DOCKER_IMAGE_SSR $DOCKER_IMAGE_NGINX

          az webapp config container set --resource-group $GROUP --name $APP --multicontainer-config-type compose --multicontainer-config-file dist/docker-compose.yml || az webapp create --resource-group $GROUP --plan ${{ secrets.AZURE_DEMO_APPSERVICEPLAN }} --name $APP --multicontainer-config-type compose --multicontainer-config-file dist/docker-compose.yml
          az webapp update --resource-group $GROUP --name $APP --https-only true
          az webapp config container set --docker-registry-server-password ${{ secrets.DOCKER_REGISTRY_PASSWORD }} --docker-registry-server-url ${{ secrets.DOCKER_REGISTRY }} --docker-registry-server-user ${{ secrets.DOCKER_REGISTRY_USERNAME }} --name $APP --resource-group $GROUP

      - name: Create Demo Server Links Markdown File
        run: |
          echo ${{ env.AZURE_WEBAPP_NAME }}
          cat <<EOF > demo-server-links.md
          Azure Demo Servers are available:
          - [Demo Server B2B](https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/en/home)
          - [Demo Server B2C](https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/b2c/home)
          EOF

          # Write demo server links to GitHub Step Summary
          cat demo-server-links.md >$GITHUB_STEP_SUMMARY

      - name: Find Pull Request
        uses: juliangruber/find-pull-request-action@v1
        id: find-pull-request
        with:
          branch: ${{ github.ref_name }}

      - name: Create Demo Server Comment
        if: steps.find-pull-request.outputs.number != ''
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ steps.find-pull-request.outputs.number }}
          body-file: demo-server-links.md
