# https://github.com/marketplace/actions/github-issues-to-azure-devops

name: Sync Issue to Azure DevOps

on:
  issues:
    types:
      - opened
      - edited
      - deleted
      - closed
      - reopened
  issue_comment:
    types:
      - created
      - edited
      - deleted

concurrency:
  group: issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - name: GitHub Issues to Azure DevOps
        uses: danhellem/github-actions-issue-to-work-item@v2.5
        env:
          ado_token: '${{ secrets.ADO_PERSONAL_ACCESS_TOKEN }}'
          github_token: '${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}'
          ado_organization: 'intershop-com'
          ado_project: 'Products'
          ado_area_path: "Products\\PWA"
          ado_iteration_path: 'Products'
          ado_wit: 'Issue'
          ado_new_state: 'New'
          ado_active_state: 'Active'
          ado_close_state: 'Closed'
          ado_bypassrules: false
          log_level: 100
