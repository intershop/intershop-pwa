@if (buyers$ | async; as buyers) {
  <select class="form-control" data-testing-id="buyers-select-box" [formControl]="control" [formlyAttributes]="field">
    <option value="all">
      {{ 'account.order_history.filter.all_buyers' | translate }}
    </option>
    @if (buyers.length) {
      @for (buyer of buyers; track buyer.businessPartnerNo) {
        <option [value]="buyer.businessPartnerNo">{{ buyer.firstName }} {{ buyer.lastName }}</option>
      }
    }
  </select>
}
