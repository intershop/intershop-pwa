<ng-template #BudgetPriceTypeInfo>
  <span
    [ishServerHtml]="
      ('account.organization.budget_price_type.info' | translate : { type: (customer$ | async).budgetPriceType }) +
      (suffix ?? '' | translate)
    "
  >
  </span
></ng-template>
@if ('services.OrderApprovalServiceDefinition.runnable' | ishServerSetting) {
<button
  type="button"
  class="btn btn-link budget-info"
  [ngbPopover]="BudgetPriceTypeInfo"
  placement="auto"
  data-testing-id="budgetPriceTypeInfoTestingID"
  [title]="'account.organization.budget_price_type.icon' | translate"
>
  <fa-icon [icon]="['fas', 'info-circle']" />
</button>
}
