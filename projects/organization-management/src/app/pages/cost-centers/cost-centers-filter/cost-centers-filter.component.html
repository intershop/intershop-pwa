@if (fields) {
  <form [formGroup]="form" (ngSubmit)="submitForm()">
    <div>
      <formly-form [fields]="[fields[0]]" [form]="form" [model]="model$ | async" />
    </div>
    <div class="row mb-4 justify-content-end">
      <div class="col-md-8 text-end">
        <button class="btn btn-primary me-0" type="submit">{{ 'account.costcenter.filter.apply' | translate }}</button>
      </div>
    </div>
  </form>
}
