@if (selectedUser$ | async; as user) {
  <div>
    <h1>{{ 'account.user.update_profile.heading' | translate }} - {{ user.firstName }} {{ user.lastName }}</h1>
    <form
      #form="ngForm"
      class="form-horizontal"
      ishFormSubmit
      novalidate
      [formGroup]="profileForm"
      (ngSubmit)="submitForm(user)"
    >
      <ish-user-profile-form [error]="userError$ | async" [form]="profileForm" [user]="user" />
      <div class="row">
        <div class="offset-md-4 col-md-8">
          <button
            class="btn btn-primary"
            data-testing-id="edit-user-submit"
            type="submit"
            [disabled]="profileForm.invalid && form.submitted"
          >
            {{ 'account.update.button.label' | translate }}
          </button>
          <a class="btn btn-secondary" data-testing-id="edit-user-cancel" routerLink="../">{{
            'account.cancel.link' | translate
          }}</a>
        </div>
      </div>
    </form>
    @if (loading$ | async) {
      <ish-loading />
    }
  </div>
}
