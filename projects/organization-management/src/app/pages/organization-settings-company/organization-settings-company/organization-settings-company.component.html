<h1>{{ 'account.company_profile.heading' | translate }}</h1>

<ish-error-message [error]="error" />

<p>{{ 'account.company_profile.heading.text' | translate }}</p>

<div class="row">
  <div class="col-md-10 col-xl-8">
    <div class="section">
      <p aria-hidden="true" class="indicates-required">
        <span class="required">*</span>{{ 'account.required_field.message' | translate }}
      </p>
      <form
        #form="ngForm"
        class="form-horizontal"
        ishFormSubmit
        [formGroup]="organizationSettingsCompanyForm"
        (ngSubmit)="submit()"
      >
        <formly-form [fields]="fields" [form]="organizationSettingsCompanyForm" [model]="model" />
        <div class="row">
          <div class="offset-md-4 col-md-8">
            <button
              class="btn btn-primary"
              type="submit"
              [disabled]="form.submitted && organizationSettingsCompanyForm.invalid"
            >
              {{ 'account.update.button.label' | translate }}
            </button>
            <a class="btn btn-secondary" routerLink="/account/organization/settings">{{
              'account.cancel.link' | translate
            }}</a>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
