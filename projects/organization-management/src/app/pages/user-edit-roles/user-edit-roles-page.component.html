@if (selectedUser$ | async; as user) {
  <div>
    <h1>{{ 'account.user.update_roles.heading' | translate }} - {{ user.firstName }} {{ user.lastName }}</h1>

    <ish-error-message [error]="error$ | async" />

    @if (form$ | async; as form) {
      <form class="form-horizontal" novalidate [formGroup]="form" (ngSubmit)="submitForm()">
        <ish-user-roles-selection formControlName="roleIDs" [staticRoles]="staticRoles$ | async" />

        <div class="row">
          <div class="offset-md-4 col-md-8">
            <button class="btn btn-primary" data-testing-id="edit-roles-submit" type="submit">
              {{ 'account.update.button.label' | translate }}
            </button>
            <a class="btn btn-secondary" data-testing-id="edit-roles-cancel" routerLink="../">{{
              'account.cancel.link' | translate
            }}</a>
          </div>
        </div>
      </form>
    }
    @if (loading$ | async) {
      <ish-loading />
    }
  </div>
}
