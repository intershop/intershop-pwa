<div class="row">
  <div class="col-md-12">
    <h1>{{ 'account.user.new.heading' | translate }}</h1>
    <form
      [formGroup]="form"
      ishFormSubmit
      #userForm="ngForm"
      class="form-horizontal"
      novalidate
      (ngSubmit)="submitForm()"
    >
      <ish-user-profile-form [form]="profile" [error]="userError$ | async" />
      <ish-user-roles-selection formControlName="roleIDs" />
      <ish-user-budget-form
        *ngIf="'services.OrderApprovalServiceDefinition.runnable' | ishServerSetting"
        [form]="budgetForm"
      />
      <div class="row">
        <div class="offset-md-4 col-md-8">
          <div id="submit-button-help" aria-live="polite" class="sr-only" *ngIf="form.invalid && userForm.submitted">
            {{ 'forms.required.button.label.disabled' | translate }}
          </div>
          <button
            type="submit"
            class="btn btn-primary"
            [attr.aria-disabled]="form.invalid && userForm.submitted"
            [attr.aria-describedby]="form.invalid && userForm.submitted ? 'submit-button-help' : null"
            data-testing-id="create-user-submit"
          >
            {{ 'account.user.new.button.create.label' | translate }}
          </button>
          <a routerLink="../" class="btn btn-secondary" data-testing-id="create-user-cancel">{{
            'account.cancel.link' | translate
          }}</a>
        </div>
      </div>
    </form>
  </div>
  <ish-loading *ngIf="loading$ | async" />
</div>
